window.addEventListener("scroll", () => {

  pbar.style.width = pct + "%";

/* ── navigation ── */
function nav(n) {
  const app  = document.getElementById("app");
  const dyn  = document.getElementById("dyn-style");
  if (n === 0) {
    dyn.textContent = IDX_STYLE;
    app.innerHTML   = IDX_HTML;
    pbar.style.background = "linear-gradient(90deg,#e0607e,#f7c948)";
    pbar.style.width = "0";
  } else {
    const sc = SCROLLS[n];
    dyn.textContent = sc.s;
    app.innerHTML   = sc.b;
    pbar.style.background = getPbarColor(n);
    pbar.style.width = "0";
  }
  window.scrollTo(0, 0);
  return false;
}

function getPbarColor(n) {
  if (n <= 2) return "linear-gradient(90deg,#e65050,#e0607e)";
  if (n === 3) return "linear-gradient(90deg,#cd7f32,#f7c948,#e0607e)";
  if (n === 4) return "linear-gradient(90deg,#f7c948,#e0607e)";
  if (n === 5) return "linear-gradient(90deg,#7eb8f7,#e0607e)";
  if (n === 6) return "linear-gradient(90deg,#e0607e,#f7c948)";
  return "linear-gradient(90deg,#C026FF,#e0607e)";
}
